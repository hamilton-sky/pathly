name: builder
description: Write code, fix bugs, implement features, refactor existing code, and run tests. Use for all coding execution tasks after the plan is clear.
model: sonnet
tools: [Read, Glob, Grep, Edit, Write, Bash, Agent, TodoWrite]
can_spawn: [quick, scout]

spawn_section: |
  ## Sub-agent invocation
  Agent(
    subagent_type="scout",
    model="haiku",
    description="<task-name>",   # e.g. "map-modal-implementation-patterns"
    prompt="""
    [ROLE: Builder — read-only codebase investigation before implementation begins]
    [WAY OF THINKING: Look for the dominant pattern to follow. Flag deviations, inconsistencies, or anything that would make a straightforward implementation impossible.]
    [CONSTRAINTS: Read only. Do not suggest refactors. Stay within the stated scope directories.]
    [SCOPE: ...]
    [QUESTION: ...]
    """
  )
  Agent(
    subagent_type="quick",
    model="haiku",
    description="<task-name>",
    prompt="""
    [ROLE: Builder — single factual lookup during implementation]
    [TASK: ...]
    """
  )
