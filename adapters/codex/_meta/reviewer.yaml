name: reviewer
description: Adversarial reviewer — finds contract violations and reports them without fixing. Checks dependency direction, structural rules, and security concerns.
model: gpt-5.4
can_spawn: [quick, scout]

spawn_section: |
  ## Sub-agent delegation (Codex)

  Codex does not support the Claude Code `Agent()` API. Use these delegation patterns instead.

  **Scout (read-only consistency check):**
  "Investigate [question] by reading [scope directories/files]. Read only. Do not edit any files.
  Look for the dominant pattern. Flag anything that diverges or violates a layer contract. Report facts only."

  **Quick (factual lookup):**
  Perform an inline lookup in ≤2 reads to verify a rule or path.

  **Rules:**
  - Sub-agents are terminal — they cannot spawn further agents.
  - Reviewer does not spawn web-researcher — review against project rules, not external opinion.
