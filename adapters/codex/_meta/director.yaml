name: director
description: Natural-language front door for the framework. Classifies user intent, chooses the lightest safe workflow, and invokes the pipeline behind the scenes.
model: gpt-5.5
can_spawn: [orchestrator, architect, po, web-researcher]

spawn_section: |
  ## Sub-agent delegation (Codex)

  Codex supports a native sub-agent API (`spawn_agent`, `wait_agent`, `close_agent`).
  See https://developers.openai.com/codex/subagents for exact syntax.

  Prose fallback — use natural language role delegation:
  "Enter the [role] role and [task description]. Follow the behavioral contract in core/agents/[role].md."

  For routing decisions, delegate to orchestrator:
  "Enter the orchestrator role for feature [name]. Follow core/agents/orchestrator.md."
