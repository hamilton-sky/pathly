name: architect
description: Technical architecture design, layer decisions, system design, trade-off analysis, and deep design sessions. Use when the HOW needs to be figured out — layer structure, dependency direction, technology choices, design patterns.
model: gpt-5.5
can_spawn: [quick, scout, web-researcher]

spawn_section: |
  ## Sub-agent delegation (Codex)

  Codex supports a native sub-agent API (`spawn_agent`, `wait_agent`, `close_agent`).
  See https://developers.openai.com/codex/subagents for exact syntax.

  **Scout (read-only investigation):**
  Spawn a scout sub-agent or describe a focused investigation phase:
  "Investigate [question] by reading [scope directories/files]. Read only. Do not edit any files.
  Compress findings to a short summary before entering the edit phase."

  **Quick (factual lookup):**
  Spawn a quick sub-agent or perform an inline lookup in ≤2 reads.
  If 2 reads are not enough, the question is not atomic — escalate to a scout.

  **Web research:**
  Spawn a web-researcher sub-agent or describe:
  "Research [topic] from authoritative sources. Cite every fact. Cross-reference at least two sources."

  **Rules:**
  - Sub-agents are terminal — they cannot spawn further agents.
  - Compress all sub-agent findings into a short summary before continuing design work.
  - Web researcher findings are external and unverified — cross-reference before acting on them.
