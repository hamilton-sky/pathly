name: builder
description: Write code, fix bugs, implement features, refactor existing code, and run tests. Use for all coding execution tasks after the plan is clear.
model: claude-sonnet-4-6
status: experimental
can_spawn: [quick, scout]

spawn_section: |
  ## Sub-agent delegation (Copilot Chat)

  Copilot Chat does not support the Claude Code `Agent()` API. Use these delegation patterns instead.

  **Investigation phase:**
  Use `@workspace` to explore the codebase before editing. Use `#file:path` to read specific files.
  Describe your investigation plan: "I will read [files/dirs] to understand [question]."
  Compress findings to a short summary before entering the edit phase.

  **Quick lookup:**
  Use `#file:path` for a single-file read in ≤2 lookups. If more are needed, run a full investigation first.

  **Rules:**
  - Read only during the investigation phase — no edits.
  - Compress findings before touching any file.
