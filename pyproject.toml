[project]
name = "claude-agents-framework"
version = "2.0.0"
description = "Claude Code plugin framework for agentic feature delivery workflows."
readme = "README.md"
requires-python = ">=3.11"
license = {file = "LICENSE"}
dependencies = [
    "anthropic>=0.40.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[project.urls]
Homepage = "https://github.com/hamilton-sky/claude-agents-framework"
Repository = "https://github.com/hamilton-sky/claude-agents-framework"
Issues = "https://github.com/hamilton-sky/claude-agents-framework/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = ["-p", "no:cacheprovider"]
