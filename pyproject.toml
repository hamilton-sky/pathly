[project]
name = "pathly"
version = "2.0.0"
description = "Pathly: guided agent workflows for planning, building, reviewing, debugging, testing, and learning from software changes."
readme = "README.md"
requires-python = ">=3.11"
license = {file = "LICENSE"}
dependencies = [
    "anthropic>=0.40.0",
]

[project.scripts]
pathly = "pathly.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[project.urls]
Homepage = "https://github.com/hamilton-sky/pathly"
Repository = "https://github.com/hamilton-sky/pathly"
Issues = "https://github.com/hamilton-sky/pathly/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = ["-p", "no:cacheprovider"]

[tool.setuptools.packages.find]
include = ["orchestrator*", "pathly*", "scripts*"]
