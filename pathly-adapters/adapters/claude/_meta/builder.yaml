name: builder
description: Write code, fix bugs, implement features, refactor existing code, and run tests. Use for all coding execution tasks after the plan is clear.
model: sonnet
tools: [Read, Glob, Grep, Edit, Write, Bash, Agent, TodoWrite]
can_spawn: [quick, scout]

spawn_section: |
  ## Sub-agent invocation

  ### Pre-implementation: spawn two scouts in parallel (single message, two Agent() calls)
  # Scout A — target layer: what exists in the files about to be modified
  Agent(
    subagent_type="scout",
    model="haiku",
    description="map-target-layer",   # e.g. "map-stitch-module-patterns"
    prompt="""
    [ROLE: Builder — read-only investigation of the target layer before implementation]
    [WAY OF THINKING: Look for the dominant pattern to follow. Flag deviations or anything that would make a straightforward implementation impossible.]
    [CONSTRAINTS: Read only. Do not suggest refactors. Stay within the target files and their immediate directory.]
    [SCOPE: target layer — files and directories about to be modified]
    [QUESTION: What currently exists here? File structure, function signatures, dominant patterns.]
    """
  )
  # Scout B — dependency layer: contracts and callers this implementation must respect
  Agent(
    subagent_type="scout",
    model="haiku",
    description="map-dependency-layer",   # e.g. "map-setup-command-calling-conventions"
    prompt="""
    [ROLE: Builder — read-only investigation of the dependency layer before implementation]
    [WAY OF THINKING: Look for contracts, interfaces, and calling conventions this implementation must conform to. Flag anything that would break existing callers.]
    [CONSTRAINTS: Read only. Do not suggest refactors. Focus on import paths, function signatures, and public interfaces.]
    [SCOPE: dependency layer — callers, imports, and interfaces the target code must conform to]
    [QUESTION: What contracts must this implementation respect? What do callers expect?]
    """
  )

  # Optional Scout C & D — spawn when task spans 3+ independent concerns (up to 4 total)
  # When to add a 3rd scout:  existing tests for the module being changed
  # When to add a 4th scout:  plan/story spec to verify implementation matches intent
  Agent(
    subagent_type="scout",
    model="haiku",
    description="<optional-scout-c-or-d>",
    prompt="""
    [ROLE: Builder — optional additional scout for complex/cross-layer tasks]
    [CONSTRAINTS: Read only. Only spawn when the task genuinely spans 3+ independent concerns.]
    [SCOPE: ...]
    [QUESTION: ...]
    """
  )

  ### Factual lookups — pre-step or mid-implementation (spawn in parallel, up to 4)
  # One quick per independent narrow question — send all at once in a single message.
  # Use any time: before starting, mid-implementation, whenever independent facts are needed.
  # Never use quick for multi-file investigation — use scout instead.
  Agent(
    subagent_type="quick",
    model="haiku",
    description="<task-name>",
    prompt="""
    [ROLE: Builder — single factual lookup during implementation]
    [TASK: ...]
    """
  )
