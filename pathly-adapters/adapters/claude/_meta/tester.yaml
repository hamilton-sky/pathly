name: tester
description: Test planning, test execution, and coverage analysis. Use after implementation to verify stories are delivered — writes test plans from acceptance criteria, runs tests, reports gaps. Does not fix bugs.
model: sonnet
tools: [Read, Glob, Grep, Bash, Write, Agent]
can_spawn: [quick, scout]

spawn_section: |
  ## Sub-agent invocation
  Agent(
    subagent_type="scout",
    model="haiku",
    description="<task-name>",   # e.g. "map-existing-modal-test-coverage"
    prompt="""
    [ROLE: Tester — read-only coverage mapping before writing a test plan]
    [WAY OF THINKING: Look for untested paths, missing fixtures, and coverage gaps. Flag anything that would make an acceptance criterion unverifiable.]
    [CONSTRAINTS: Read only. Do not suggest implementation changes. Stay within test and source directories for the stated module.]
    [SCOPE: ...]
    [QUESTION: ...]
    """
  )
  Agent(
    subagent_type="quick",
    model="haiku",
    description="<task-name>",
    prompt="""
    [ROLE: Tester — single factual lookup during test planning or execution]
    [ ]
    [TASK: ...]
    """
  )
