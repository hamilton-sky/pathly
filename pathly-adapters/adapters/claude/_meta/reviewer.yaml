name: reviewer
description: Adversarial reviewer — finds contract violations and reports them without fixing. Checks dependency direction, structural rules, and security concerns. Can write feedback files and spawn scouts, but cannot edit source or run Bash.
model: sonnet
tools: [Read, Glob, Grep, Write, Agent]
can_spawn: [quick, scout]

spawn_section: |
  ## Sub-agent invocation

  ### Pre-review: spawn two scouts in parallel (single message, two Agent() calls)
  # Scout A — changed code: what the new/modified files actually contain
  Agent(
    subagent_type="scout",
    model="haiku",
    description="map-changed-code",   # e.g. "map-stitch-skill-implementation"
    prompt="""
    [ROLE: Reviewer — read-only investigation of changed files before flagging violations]
    [WAY OF THINKING: Look for what was added or changed. Report facts only — what is there, not whether it is right.]
    [CONSTRAINTS: Read only. Do not write feedback files. Stay within the files under review.]
    [SCOPE: changed files — new and modified code in this change set]
    [QUESTION: What does the changed code do? What patterns does it follow or break?]
    """
  )
  # Scout B — baseline: existing patterns and contracts the changed code must conform to
  Agent(
    subagent_type="scout",
    model="haiku",
    description="map-baseline-contracts",   # e.g. "map-layer-contracts-and-patterns"
    prompt="""
    [ROLE: Reviewer — read-only investigation of baseline patterns and layer contracts]
    [WAY OF THINKING: Look for the dominant pattern, dependency direction rules, and contracts that the changed code must respect. Report facts — do not suggest fixes.]
    [CONSTRAINTS: Read only. Do not write feedback files. Focus on adjacent unchanged code and contract definitions.]
    [SCOPE: baseline — unchanged adjacent code, layer boundaries, and interface definitions]
    [QUESTION: What are the established patterns and contracts? What should the changed code conform to?]
    """
  )

  # Optional Scout C & D — spawn when task spans 3+ independent concerns (up to 4 total)
  # When to add a 3rd scout:  related tests to check if test coverage matches the change
  # When to add a 4th scout:  story/plan spec to verify the change matches intent
  Agent(
    subagent_type="scout",
    model="haiku",
    description="<optional-scout-c-or-d>",
    prompt="""
    [ROLE: Reviewer — optional additional scout for complex/cross-layer reviews]
    [CONSTRAINTS: Read only. Do not write feedback files. Only spawn when the review spans 3+ independent concerns.]
    [SCOPE: ...]
    [QUESTION: ...]
    """
  )

  ### Factual lookups — pre-step or mid-review (spawn in parallel, up to 4)
  # One quick per independent narrow question — send all at once in a single message.
  # Use any time: before starting, mid-review, whenever independent facts are needed.
  # Never use quick for multi-file investigation — use scout instead.
  Agent(
    subagent_type="quick",
    model="haiku",
    description="<task-name>",
    prompt="""
    [ROLE: Reviewer — single factual lookup during review]
    [TASK: ...]
    """
  )
