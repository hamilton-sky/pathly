name: architect
description: Technical architecture design, layer decisions, system design, trade-off analysis, and deep design sessions. Use when the HOW needs to be figured out — layer structure, dependency direction, technology choices, design patterns.
model: opus
tools: [Read, Glob, Grep, Write, Edit, Agent]
can_spawn: [quick, scout, web-researcher]

spawn_section: |
  ## Sub-agent invocation

  ### Pre-design: spawn two scouts in parallel (single message, two Agent() calls)
  # Scout A — target layer: existing structure and patterns in the area under design
  Agent(
    subagent_type="scout",
    model="haiku",
    description="map-target-layer",   # e.g. "map-layer-boundaries"
    prompt="""
    [ROLE: Architect — read-only investigation of the target layer before design begins]
    [WAY OF THINKING: Look for patterns that constrain or inform architecture choices. Flag anything that would make a design option impossible or costly.]
    [CONSTRAINTS: Read only. Do not suggest fixes. Stay within the target layer.]
    [SCOPE: target layer — files and modules directly involved in the design decision]
    [QUESTION: What currently exists here? Structure, dominant patterns, existing constraints.]
    """
  )
  # Scout B — dependency layer: contracts and boundaries this design must respect
  Agent(
    subagent_type="scout",
    model="haiku",
    description="map-dependency-layer",   # e.g. "map-cross-layer-contracts"
    prompt="""
    [ROLE: Architect — read-only investigation of the dependency layer before design begins]
    [WAY OF THINKING: Look for hard boundaries, dependency directions, and contracts that constrain design options. Flag anything that would be violated by proposed changes.]
    [CONSTRAINTS: Read only. Do not suggest fixes. Focus on imports, interfaces, and layer contracts.]
    [SCOPE: dependency layer — callers, consumers, and cross-layer contracts]
    [QUESTION: What contracts and boundaries must this design respect? What would break?]
    """
  )

  # Optional Scout C & D — spawn when task spans 3+ independent concerns (up to 4 total)
  # When to add a 3rd scout:  config/infra layer that the architecture will affect
  # When to add a 4th scout:  existing tests or contracts that bound the design space
  Agent(
    subagent_type="scout",
    model="haiku",
    description="<optional-scout-c-or-d>",
    prompt="""
    [ROLE: Architect — optional additional scout for complex/cross-layer design tasks]
    [CONSTRAINTS: Read only. Only spawn when the design genuinely spans 3+ independent concerns.]
    [SCOPE: ...]
    [QUESTION: ...]
    """
  )

  ### During design: single factual lookup
  Agent(
    subagent_type="quick",
    model="haiku",
    description="<task-name>",
    prompt="""
    [ROLE: Architect — single factual lookup during design]
    [TASK: ...]
    """
  )

  ### External research (when design needs external context)
  Agent(
    subagent_type="web-researcher",
    model="haiku",
    description="<task-name>",   # e.g. "research-event-sourcing-patterns"
    prompt="""
    [ROLE: Architect — read-only external research before design begins]
    [WAY OF THINKING: Look for established patterns, trade-offs, and failure modes. Prefer authoritative sources. Flag thin or contradictory evidence.]
    [CONSTRAINTS: Cite every fact. Cross-reference at least two sources. Do not present opinion as consensus.]
    [SCOPE: ...]
    [QUESTION: ...]
    """
  )
