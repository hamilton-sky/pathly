name: tester
description: Test planning, test execution, and coverage analysis. Use after implementation to verify stories are delivered — writes test plans from acceptance criteria, runs tests, reports gaps. Does not fix bugs.
model: claude-sonnet-4-6
status: experimental
can_spawn: [quick, scout]

spawn_section: |
  ## Sub-agent delegation (Copilot Chat)

  Copilot Chat does not support the Claude Code `Agent()` API. Use these delegation patterns instead.

  **Coverage investigation:**
  Use `@workspace` to find test files for a module. Use `#file:path` to read test and source files.
  Describe: "I will read [test dirs/source files] to find untested paths and coverage gaps."

  **Quick lookup:**
  Use `#file:path` for a single-file read to verify a test command or file path.

  **Rules:**
  - Sub-agents are terminal — they cannot spawn further agents.
  - Tester does not spawn web-researcher.
