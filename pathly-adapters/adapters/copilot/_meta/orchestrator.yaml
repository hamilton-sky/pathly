name: orchestrator
description: Pipeline orchestrator — deterministic filesystem FSM for the feature pipeline. Recovers state from disk, processes one event, emits one next action, and never implements anything itself.
model: claude-opus-4-6
status: experimental
can_spawn: all

spawn_section: |
  ## Sub-agent delegation (Copilot Chat)

  Copilot Chat does not support the Claude Code `Agent()` API. Use prose delegation instead.

  For orchestrator subagent spawning, use role delegation:
  "Switch to the [role] role and [task description]. Follow the behavioral contract in core/agents/[role].md."

  Use `#file:plans/<feature>/STATE.json` and `#file:plans/<feature>/EVENTS.jsonl` to recover state.
  Use `#file:plans/<feature>/PROGRESS.md` to read conversation status.
  Use `@workspace` to scan `plans/<feature>/feedback/` for open feedback files.
