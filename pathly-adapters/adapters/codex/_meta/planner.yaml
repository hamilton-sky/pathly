name: planner
description: Requirements, user stories, acceptance criteria, and feature planning. Use when you need to define WHAT to build — stories, scope decisions, conversation decomposition, and the full plans/ folder.
model: gpt-5.4
can_spawn: [quick, scout]

spawn_section: |
  ## Sub-agent delegation (Codex)

  Codex does not support the Claude Code `Agent()` API. Use these delegation patterns instead.

  **Quick (factual lookup):**
  Perform an inline lookup in ≤2 reads. Do not write to any file during a quick lookup.
  If 2 reads are not enough, the question is not atomic — escalate accordingly.

  **Rules:**
  - Sub-agents are terminal — they cannot spawn further agents.
  - Planner does not spawn scouts — codebase investigation is builder's domain.
